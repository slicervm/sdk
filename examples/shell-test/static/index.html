<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slicer Shell Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a; color: #c0caf5;
      height: 100vh; display: flex; flex-direction: column;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: #1a1b2e; border-bottom: 1px solid #2a2b3e;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #7aa2f7; }
    .controls { display: flex; align-items: center; gap: 10px; }
    #status {
      font-size: 13px; padding: 4px 10px; border-radius: 4px; background: #2a2b3e;
    }
    #status.connected { color: #9ece6a; }
    #status.connecting { color: #e0af68; }
    #status.disconnected { color: #f7768e; }
    #status.launching { color: #bb9af7; }
    select {
      padding: 5px 10px; font-size: 13px; border-radius: 4px;
      border: 1px solid #2a2b3e; background: #1a1b2e; color: #c0caf5; outline: none;
    }
    select:focus { border-color: #7aa2f7; }
    button {
      padding: 6px 16px; font-size: 13px; font-weight: 500;
      border: none; border-radius: 4px; cursor: pointer; transition: background 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-connect { background: #7aa2f7; color: #1a1b26; }
    .btn-connect:hover:not(:disabled) { background: #89b4fa; }
    .btn-disconnect { background: #f7768e; color: #1a1b26; }
    .btn-disconnect:hover { background: #ff9eaa; }
    .btn-launch { background: #9ece6a; color: #1a1b26; }
    .btn-launch:hover:not(:disabled) { background: #b4e88d; }
    #terminal-container { flex: 1; overflow: hidden; position: relative; }
    #blank-state {
      position: absolute; inset: 0; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; background: #0f0f1a; z-index: 5;
    }
    #blank-state .icon { font-size: 48px; opacity: 0.3; }
    #blank-state .msg {
      font-size: 14px; color: #565f89; text-align: center; line-height: 1.8;
      max-width: 420px;
    }
    #blank-state .msg code {
      background: #1a1b2e; padding: 2px 6px; border-radius: 3px;
      font-size: 13px; color: #7aa2f7;
    }
    .hidden { display: none !important; }
    .spinner {
      display: inline-block; width: 14px; height: 14px; border: 2px solid #1a1b26;
      border-top-color: transparent; border-radius: 50%;
      animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Slicer Shell Test</h1>
    <div class="controls">
      <select id="vmSelect"><option value="">Loading…</option></select>
      <span id="status" class="disconnected">Disconnected</span>
      <button id="connectBtn" class="btn-connect" disabled>Connect</button>
      <button id="disconnectBtn" class="btn-disconnect hidden">Disconnect</button>
      <button id="launchBtn" class="btn-launch hidden">Launch VM</button>
    </div>
  </header>
  <div id="terminal-container">
    <div id="blank-state">
      <div class="icon">⬡</div>
      <div class="msg" id="blankMsg">Loading…</div>
    </div>
    <div id="terminal-el"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    // --- frame protocol ---
    const FRAME_DATA = 0x01, FRAME_WINDOW_SIZE = 0x02, FRAME_SHUTDOWN = 0x03,
          FRAME_HEARTBEAT = 0x04, FRAME_SESSION_CLOSE = 0x05;
    const enc = new TextEncoder(), dec = new TextDecoder();

    function encodeFrame(type, payload) {
      const len = payload ? payload.byteLength : 0;
      const buf = new Uint8Array(5 + len);
      buf[0] = type;
      new DataView(buf.buffer).setUint32(1, len, false);
      if (payload) buf.set(payload, 5);
      return buf;
    }
    function parseFrame(data) {
      if (data.byteLength < 5) return null;
      const v = new DataView(data);
      const type = v.getUint8(0), len = v.getUint32(1, false);
      if (data.byteLength < 5 + len) return null;
      return { type, payload: new Uint8Array(data, 5, len) };
    }

    // --- elements ---
    const vmSelect = document.getElementById('vmSelect');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const launchBtn = document.getElementById('launchBtn');
    const statusEl = document.getElementById('status');
    const blankState = document.getElementById('blank-state');
    const blankMsg = document.getElementById('blankMsg');
    const terminalEl = document.getElementById('terminal-el');

    let term = null, fitAddon = null, ws = null, heartbeat = null, dataListener = null;
    let hostGroups = [];

    function initTerminal() {
      if (term) return;
      term = new Terminal({
        cursorBlink: true, fontSize: 14,
        fontFamily: '"JetBrains Mono", "Fira Code", Menlo, Monaco, monospace',
        theme: {
          background: '#0f0f1a', foreground: '#c0caf5', cursor: '#c0caf5',
          selectionBackground: '#364a82',
          black: '#15161e', red: '#f7768e', green: '#9ece6a', yellow: '#e0af68',
          blue: '#7aa2f7', magenta: '#bb9af7', cyan: '#7dcfff', white: '#a9b1d6',
        },
      });
      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(terminalEl);
    }

    function setUI(mode, extra) {
      statusEl.className = mode;
      connectBtn.classList.add('hidden');
      disconnectBtn.classList.add('hidden');
      launchBtn.classList.add('hidden');
      vmSelect.disabled = true;

      switch (mode) {
        case 'connected':
          statusEl.textContent = 'Connected';
          disconnectBtn.classList.remove('hidden');
          blankState.classList.add('hidden');
          break;
        case 'connecting':
          statusEl.textContent = 'Connecting…';
          blankState.classList.add('hidden');
          break;
        case 'launching':
          statusEl.textContent = 'Launching VM…';
          blankState.classList.remove('hidden');
          blankMsg.innerHTML = '<span class="spinner"></span>Launching a new VM and waiting for agent…';
          break;
        case 'disconnected':
          statusEl.textContent = 'Disconnected';
          blankState.classList.remove('hidden');
          if (extra === 'empty') {
            blankMsg.innerHTML = 'No running VMs found.<br>Click <strong>Launch VM</strong> to create one.';
            if (hostGroups.length > 0) launchBtn.classList.remove('hidden');
          } else {
            blankMsg.textContent = 'Select a VM and click Connect.';
            connectBtn.classList.remove('hidden');
            connectBtn.disabled = !vmSelect.value;
            vmSelect.disabled = false;
          }
          break;
      }
    }

    function sendResize() {
      if (!ws || ws.readyState !== WebSocket.OPEN || !term) return;
      const p = new Uint8Array(8);
      const v = new DataView(p.buffer);
      v.setUint32(0, term.cols, false);
      v.setUint32(4, term.rows, false);
      ws.send(encodeFrame(FRAME_WINDOW_SIZE, p));
    }

    // --- VM list ---
    async function loadVMs() {
      try {
        const [vmsRes, groupsRes] = await Promise.all([
          fetch('/api/vms'), fetch('/api/hostgroups'),
        ]);
        if (!vmsRes.ok) throw new Error(await vmsRes.text());
        const vms = await vmsRes.json();
        if (groupsRes.ok) hostGroups = await groupsRes.json();

        vmSelect.innerHTML = '';
        const running = (vms || []).filter(v => v.status === 'Running');
        if (running.length === 0) {
          vmSelect.innerHTML = '<option value="">No running VMs</option>';
          setUI('disconnected', 'empty');
          return;
        }
        for (const vm of running) {
          const opt = document.createElement('option');
          opt.value = vm.hostname;
          opt.textContent = vm.hostname + ' (' + (vm.ip || '').split('/')[0] + ')';
          vmSelect.appendChild(opt);
        }
        setUI('disconnected');
      } catch (e) {
        vmSelect.innerHTML = '<option value="">Error</option>';
        blankState.classList.remove('hidden');
        blankMsg.textContent = 'Failed to list VMs: ' + e.message;
      }
    }

    // --- launch ---
    async function launchVM() {
      const group = hostGroups.length === 1
        ? hostGroups[0].name
        : prompt('Host group name:', hostGroups[0]?.name || '');
      if (!group) return;

      setUI('launching');
      try {
        const res = await fetch('/api/launch?group=' + encodeURIComponent(group), { method: 'POST' });
        if (!res.ok) throw new Error(await res.text());
        const vm = await res.json();
        await loadVMs();
        // Auto-select the new VM
        if (vm.hostname) vmSelect.value = vm.hostname;
        setUI('disconnected');
      } catch (e) {
        blankMsg.textContent = 'Launch failed: ' + e.message;
        setTimeout(loadVMs, 2000);
      }
    }

    // --- connect / disconnect ---
    function connect() {
      const vm = vmSelect.value;
      if (!vm || ws) return;
      initTerminal();
      setUI('connecting');

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/ws/shell?vm=' + encodeURIComponent(vm));
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        setUI('connected');
        term.reset();
        term.focus();
        requestAnimationFrame(() => { fitAddon.fit(); sendResize(); });
        heartbeat = setInterval(() => ws.send(encodeFrame(FRAME_HEARTBEAT)), 30000);
      };

      ws.onmessage = (ev) => {
        if (!(ev.data instanceof ArrayBuffer)) return;
        const f = parseFrame(ev.data);
        if (!f) return;
        if (f.type === FRAME_DATA) term.write(dec.decode(f.payload));
        if (f.type === FRAME_SHUTDOWN || f.type === FRAME_SESSION_CLOSE) cleanup();
      };

      ws.onclose = () => cleanup();
      ws.onerror = () => cleanup();

      dataListener = term.onData((data) => {
        if (ws && ws.readyState === WebSocket.OPEN)
          ws.send(encodeFrame(FRAME_DATA, enc.encode(data)));
      });
    }

    function disconnect() {
      if (ws) { try { ws.send(encodeFrame(FRAME_SHUTDOWN)); } catch {} }
      cleanup();
    }

    function cleanup() {
      if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
      if (dataListener) { dataListener.dispose(); dataListener = null; }
      if (ws) { try { ws.close(); } catch {} ws = null; }
      if (term) term.reset();
      setUI('disconnected');
    }

    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', disconnect);
    launchBtn.addEventListener('click', launchVM);
    vmSelect.addEventListener('change', () => { connectBtn.disabled = !vmSelect.value; });

    window.addEventListener('resize', () => { if (fitAddon) { fitAddon.fit(); sendResize(); } });
    new ResizeObserver(() => { if (fitAddon) { fitAddon.fit(); sendResize(); } })
      .observe(document.getElementById('terminal-container'));

    loadVMs();
  </script>
</body>
</html>
